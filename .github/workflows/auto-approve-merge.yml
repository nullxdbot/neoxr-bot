name: Auto Approve and Merge PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  repository-projects: read

jobs:
  approve-and-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'neoxr'
    
    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Get AI Code Review
        id: ai-review
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          DIFF=$(gh pr diff ${{ github.event.pull_request.number }} | head -c 3000)
          
          if [ -z "$DIFF" ]; then
            MESSAGE="✅ Approved automatically (No code changes detected)."
          else
            RESPONSE=$(curl -s -X POST "https://xorasync-ai.hf.space/api/review" \
              --data-urlencode "prompt=$DIFF" \
              --data-urlencode "apikey=${{ secrets.NEOXR_API_KEY }}")
            
            MESSAGE=$(echo "$RESPONSE" | jq -r '.data.message // "✅ Approved automatically"')
          fi
          
          {
            echo "AI_COMMENT<<EOF"
            echo "$MESSAGE"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Approve PR
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          COMMENT_BODY: ${{ env.AI_COMMENT }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve -b "$COMMENT_BODY"

      - name: Merge PR
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch
